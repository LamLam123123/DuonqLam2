<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duong Lam</title>
  <!-- Google Fonts: Outfit (modern display) & Cascadia Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Cascadia+Mono:wght@300;400;600&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/png" href="av2.jpg">

  <!-- Firebase SDK Compat (v9/v10) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <style>
    :root {
      --primary-glow: #ff5e97;
      --secondary-glow: #e02c6d;
      --accent: #ffd166;
      --bg-dark: rgba(10, 10, 15, 0.7);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-border-hover: rgba(255, 255, 255, 0.2);
      --text-main: #f8f9fa;
      --text-muted: rgba(248, 249, 2fa, 0.6);
      --glow-shadow: 0 0 20px rgba(255, 94, 151, 0.3);
      --glow-shadow-strong: 0 0 35px rgba(255, 94, 151, 0.6);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Outfit', sans-serif;
      user-select: none;
      -webkit-user-drag: none;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: var(--text-main);
    }

    /* Ambient animated background overlay */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      overflow: hidden;
    }

    #bg-video, #bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.85) saturate(1.3);
    }

    /* Color mesh gradient fallback/enhancement overlay */
    .bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      background: radial-gradient(circle at 10% 20%, rgba(255, 94, 151, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(0, 180, 216, 0.1) 0%, transparent 40%);
      pointer-events: none;
    }

    /* Premium custom cursor trail canvas */
    #cursor-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 9999;
    }

    /* Global Glassmorphic Styles — fully transparent, no background, no border */
    .glass-panel {
      background: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      border: none;
      border-radius: 0;
      box-shadow: none;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .glass-panel:hover {
      background: none;
      border-color: transparent;
      box-shadow: none;
    }

    /* TOP LEFT: Avatar, Name & Socials */
    .profile-section {
      position: fixed;
      top: 30px;
      left: 30px;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 10;
    }

    .avatar-wrapper {
      position: relative;
      width: 75px;
      height: 75px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, var(--primary-glow), var(--accent));
      box-shadow: var(--glow-shadow);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .avatar-wrapper:hover {
      transform: scale(1.08) rotate(5deg);
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid #060608;
    }

    .profile-details {
      display: flex;
      flex-direction: column;
    }

    .profile-name {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 1px;
      background: linear-gradient(to right, #fff, #ffe3ec);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
    }

    .social-links {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .social-icon {
      color: var(--text-muted);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .social-icon svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .social-icon:hover {
      color: var(--primary-glow);
      transform: translateY(-2px);
      filter: drop-shadow(0 0 8px var(--primary-glow));
    }

    /* TOP RIGHT: Favorite (Like) Counter */
    .like-section {
      position: fixed;
      top: 30px;
      right: 30px;
      z-index: 10;
    }

    .like-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      cursor: pointer;
      border-radius: 30px;
    }

    .like-btn svg {
      width: 22px;
      height: 22px;
      fill: var(--text-muted);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .like-btn:hover {
      background: rgba(255, 94, 151, 0.1);
      border-color: rgba(255, 94, 151, 0.3);
    }

    .like-btn:hover svg {
      fill: var(--primary-glow);
      transform: scale(1.2);
      filter: drop-shadow(0 0 8px var(--primary-glow));
    }

    .like-btn.liked svg {
      fill: var(--primary-glow);
      animation: heartbeat 0.6s ease-in-out;
    }

    .like-count {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-main);
    }

    @keyframes heartbeat {
      0% {
        transform: scale(1);
      }

      30% {
        transform: scale(1.3);
      }

      60% {
        transform: scale(0.9);
      }

      100% {
        transform: scale(1);
      }
    }

    /* BOTTOM LEFT & RIGHT: Badges */
    .bottom-badge {
      position: fixed;
      bottom: 25px;
      padding: 10px 18px;
      z-index: 10;
      font-size: 13px;
      font-family: 'Cascadia Mono', monospace;
      font-weight: 600;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }

    .badge-left {
      left: 30px;
    }

    .badge-right {
      right: 30px;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary-glow);
      box-shadow: 0 0 8px var(--primary-glow);
    }

    /* CENTER: Lyrics */
    .lyrics-container {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 85%;
      max-width: 700px;
      text-align: center;
      z-index: 2;
      pointer-events: none;
    }

    .lyric-line {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.6;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.9);
      color: var(--text-main);
      opacity: 0;
      transform: translateY(15px);
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes lyricSlideDown {
      0% {
        opacity: 0;
        transform: translateY(-12px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .lyric-line.active {
      opacity: 1;
      transform: translateY(0);
      animation: lyricSlideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      background: linear-gradient(135deg, #fff 0%, #ffcbdc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: none;
      filter: drop-shadow(0 0 12px rgba(255, 94, 151, 0.4));
    }

    .lyric-line.previous {
      opacity: 0.3;
      transform: translateY(-8px);
      font-size: 14px;
      -webkit-text-fill-color: var(--text-main);
    }

    /* BOTTOM CENTER: Slide-Up Music Panel */
    .music-panel-wrapper {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      width: 440px;
      max-width: 90vw;
      z-index: 100;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 20px;
      box-shadow: none;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .music-panel-wrapper.expanded {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
    }

    /* Music Player Bar */
    .player-bar {
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: relative;
      z-index: 102;
      transition: padding 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .music-panel-wrapper.expanded .player-bar {
      padding: 16px 20px 14px 20px;
    }

    .player-track-info {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      min-width: 0;
    }

    .player-album-art {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      object-fit: cover;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 0.4s ease;
    }

    .player-track-meta {
      display: none;
      flex-direction: column;
      min-width: 0;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .music-panel-wrapper.expanded .player-track-meta {
      display: flex;
      opacity: 1;
    }

    .player-track-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-track-artist {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Music Controls */
    .player-controls {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .control-btn {
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      width: 32px;
      height: 32px;
      border-radius: 50%;
    }

    .control-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .control-btn:hover {
      background: transparent;
      border-color: transparent;
      color: var(--primary-glow);
      transform: scale(1.15);
      filter: drop-shadow(0 0 6px var(--primary-glow));
    }

    .control-btn.btn-play-pause {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: var(--text-main);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .control-btn.btn-play-pause svg {
      width: 12px;
      height: 12px;
      margin-left: 1px;
      /* Center adjustment for play triangle */
    }

    .control-btn.btn-play-pause.playing svg {
      margin-left: 0;
    }

    .control-btn.btn-play-pause:hover {
      background: rgba(255, 94, 151, 0.2);
      border-color: var(--primary-glow);
      color: #fff;
      transform: scale(1.15);
      box-shadow: var(--glow-shadow-strong);
    }

    /* Progress bar */
    .progress-container {
      position: relative;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      height: 6px;
      transition: all 0.2s ease;
    }

    .progress-container.progress-mini {
      flex: 1;
      margin: 0 16px;
      display: block;
    }

    .progress-container.progress-full {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px 20px 0 0;
      display: none;
    }

    .music-panel-wrapper.expanded .progress-container.progress-mini {
      display: block;
    }

    .music-panel-wrapper.expanded .progress-container.progress-full {
      display: none;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary-glow), var(--accent));
      border-radius: 20px;
      position: relative;
    }

    /* Timeline knob dot */
    .progress-bar::after {
      content: '';
      position: absolute;
      right: -5px;
      top: 50%;
      transform: translateY(-50%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text-main);
      box-shadow: 0 0 8px var(--primary-glow);
    }

    /* Playlist Selector Drawer (toggled by .expanded) */
    .playlist-drawer {
      height: 0;
      opacity: 0;
      overflow: hidden;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      background: rgba(255, 255, 255, 0.02);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 0 0 20px 20px;
      position: relative;
      z-index: 101;
      display: flex;
      flex-direction: column;
    }

    .music-panel-wrapper.expanded {
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    .music-panel-wrapper.expanded .playlist-drawer {
      height: 310px;
      opacity: 1;
      padding: 14px 0 10px 0;
    }

    /* Smooth transition for border-radius */
    .music-panel-wrapper.expanded .glass-panel {
      border-radius: 20px;
    }

    .drawer-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px 14px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      margin-bottom: 8px;
    }

    #btnTogglePanel svg {
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .music-panel-wrapper.expanded #btnTogglePanel svg {
      transform: rotate(180deg);
    }

    .playlist-items {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      padding: 0 10px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
    }

    .playlist-items::-webkit-scrollbar {
      width: 4px;
    }

    .playlist-items::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .playlist-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 4px;
    }

    .playlist-item:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .playlist-item.active {
      background: rgba(255, 94, 151, 0.12);
      border-left: 3px solid var(--primary-glow);
    }

    .playlist-item.active .playlist-title {
      color: var(--primary-glow);
    }

    .playlist-art {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      object-fit: cover;
    }

    .playlist-meta {
      display: flex;
      flex-direction: column;
    }

    .playlist-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
    }

    .playlist-artist {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* Floating Heart Animation for clicks */
    .floating-heart {
      position: fixed;
      pointer-events: none;
      font-size: 20px;
      color: var(--primary-glow);
      z-index: 9999;
      animation: floatUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(1) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: translateY(-120px) scale(0.6) rotate(15deg);
        opacity: 0;
      }
    }

    /* Audio Equalizer visualizer dots inside player */
    .equalizer-dots {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 16px;
    }

    .eq-bar {
      width: 2px;
      height: 3px;
      background: var(--primary-glow);
      border-radius: 2px;
      transition: height 0.15s ease;
    }

    /* Spin animation disabled */
    .spin {
      animation: none;
    }

    /* Initial overlay trigger screen */
    .click-trigger {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #060608;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      cursor: pointer;
      pointer-events: none; /* Block clicks until loaded */
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .click-trigger.ready {
      pointer-events: auto;
    }

    .trigger-circle {
      position: relative;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255, 94, 151, 0.05);
      border: 1.5px solid rgba(255, 94, 151, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(255, 94, 151, 0.1);
      transition: all 0.4s ease;
    }

    .trigger-circle::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 1px solid var(--primary-glow);
      animation: pulse-ring 2s infinite;
      box-shadow: 0 0 20px var(--primary-glow);
      opacity: 0.6;
    }

    .trigger-circle svg {
      width: 40px;
      height: 40px;
      fill: var(--primary-glow);
      filter: drop-shadow(0 0 10px var(--primary-glow));
    }

    .trigger-text {
      margin-top: 24px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 2px;
      color: var(--text-muted);
      text-transform: uppercase;
      animation: text-pulse 2s infinite alternate;
    }

    @keyframes pulse-ring {
      0% {
        transform: scale(1);
        opacity: 0.8;
      }

      100% {
        transform: scale(1.3);
        opacity: 0;
      }
    }

    @keyframes text-pulse {
      from {
        opacity: 0.4;
      }

      to {
        opacity: 0.9;
      }
    }

    /* Admin Modal */
    .admin-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 100000;
      align-items: center;
      justify-content: center;
    }

    .admin-modal.active {
      display: flex;
    }

    .admin-modal-content {
      background: rgba(20, 20, 30, 0.95);
      border: 1px solid rgba(255, 94, 151, 0.2);
      border-radius: 16px;
      padding: 30px;
      width: 340px;
      max-width: 90vw;
      text-align: center;
      backdrop-filter: blur(20px);
      position: relative;
    }

    .admin-modal-content.wide {
      width: 780px;
    }

    .admin-modal-split {
      display: flex;
      gap: 24px;
      text-align: left;
    }

    .admin-modal-left, .admin-modal-right {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    @media (max-width: 650px) {
      .admin-modal-split {
        flex-direction: column;
      }
    }

    .admin-modal-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    .admin-input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255, 94, 151, 0.25);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      outline: none;
      transition: all 0.3s ease;
      text-align: center;
      margin-bottom: 14px;
    }

    .admin-input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    .admin-input:focus {
      border-color: var(--primary-glow);
      box-shadow: 0 0 15px rgba(255, 94, 151, 0.2);
    }

    .admin-btn {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--primary-glow), var(--secondary-glow));
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }

    .admin-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 0 20px rgba(255, 94, 151, 0.4);
    }

    .admin-error {
      color: #ff4757;
      font-size: 12px;
      margin-top: 10px;
      display: none;
    }

    .admin-success {
      color: #2ed573;
      font-size: 12px;
      margin-top: 10px;
      display: none;
    }

    .admin-playlist-container {
      max-height: 380px;
      overflow-y: auto;
      margin-top: 10px;
      text-align: left;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
    }

    .admin-playlist-container::-webkit-scrollbar {
      width: 4px;
    }

    .admin-playlist-container::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .admin-playlist-item {
      display: flex;
      flex-direction: column;
      padding: 10px 15px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;

      } else {
        // Firebase: increment views
        const viewsRef = db.ref("stats/views");
        viewsRef.transaction((currentValue) => {
          return (currentValue || 103) + 1;
        });

        // Realtime listener for views
        viewsRef.on("value", (snapshot) => {
          viewsEl.textContent = snapshot.val() || 104;
        });

        // Realtime listener for likes
        const likesRef = db.ref("stats/likes");
        likesRef.on("value", (snapshot) => {
          likesEl.textContent = snapshot.val() || 0;
        });

        // Local liked tracker

          likeBtn.classList.add("liked");
        }
      }
    }

    // Like Action handler
    function handleLike() {
      const isAlreadyLiked = likeBtn.classList.contains("liked");

      if (fallbackMode) {
        let likes = parseInt(localStorage.getItem("page_likes") || "0");
        if (isAlreadyLiked) {
          likes = Math.max(0, likes - 1);
          sessionStorage.setItem("session_liked", "false");
          likeBtn.classList.remove("liked");
        } else {
          likes++;
          sessionStorage.setItem("session_liked", "true");
          likeBtn.classList.add("liked");
          spawnFloatingHearts();
        }
        localStorage.setItem("page_likes", likes);
        likesEl.textContent = likes;
      } else {
        const likesRef = db.ref("stats/likes");
        likesRef.transaction((currentValue) => {
          if (isAlreadyLiked) {
            return Math.max(0, (currentValue || 1) - 1);
          } else {
            return (currentValue || 0) + 1;
          }
        }, (error, committed) => {
          if (committed) {
            if (isAlreadyLiked) {
              sessionStorage.setItem("session_liked", "false");
              likeBtn.classList.remove("liked");
            } else {
              sessionStorage.setItem("session_liked", "true");
              likeBtn.classList.add("liked");
              spawnFloatingHearts();
            }
          }
        });
      }
    }

    async function sha256(text) {
      const encoder = new TextEncoder();
      const data = encoder.encode(text);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    const lyricsCache = {};

    // Preload all lyrics at startup
    async function preloadAllLyrics() {
      const promises = playlist.map(async (track) => {
        try {
          const response = await fetch(track.lrc);
          if (!response.ok) throw new Error('fetch fail');
          const data = await response.text();
          lyricsCache[track.lrc] = data;
        } catch (err) {
          lyricsCache[track.lrc] = null;
        }
      });
      await Promise.all(promises);
      // If first track is already loaded, apply cached lyrics

        parseLyrics(lyricsCache[playlist[currentTrackIdx].lrc]);
        if (lyrics.length > 0) lyricActive.textContent = '♪';
      }
    }
    preloadAllLyrics();

    async function loadLyrics(lrcFile) {
      try {
        if (lyricsCache[lrcFile]) {
          parseLyrics(lyricsCache[lrcFile]);
          return;
        }
        const response = await fetch(lrcFile);
        if (!response.ok) throw new Error("Lyrics fetch error");
        const data = await response.text();
        lyricsCache[lrcFile] = data;
        parseLyrics(data);
      } catch (err) {
        lyrics = [];
        lyricActive.textContent = playlist[currentTrackIdx].name;
        lyricPrev.textContent = "";
      }
    }

    function parseLyrics(text) {
      lyrics = [];
      const lines = text.split("\n");
      // regex for timestamp [mm:ss.xx] or [mm:ss:xx] or [mm:ss]
      const timeReg = /\[(\d{2}):(\d{2})(?:[.:](\d{2,3}))?\]/;

      lines.forEach(line => {
        const match = timeReg.exec(line);
        if (match) {
          const minutes = parseInt(match[1]);
          const seconds = parseInt(match[2]);
          const ms = match[3] ? parseInt(match[3]) : 0;

          // convert to total seconds
          const totalSeconds = minutes * 60 + seconds + (ms / (ms > 99 ? 1000 : 100));
          const lyricText = line.replace(timeReg, "").trim();

          if (lyricText) {
            lyrics.push({ time: totalSeconds, text: lyricText });
          }
        }
      });

      // Sort by timestamp
      lyrics.sort((a, b) => a.time - b.time);
      if (lyrics.length === 0) {
        lyricActive.textContent = playlist[currentTrackIdx].name;
      }
    }

    function syncLyrics() {
      if (lyrics.length === 0) return;
      const curTime = audio.currentTime;
      let activeIdx = -1;

      for (let i = 0; i < lyrics.length; i++) {
        if (curTime >= lyrics[i].time) {
          activeIdx = i;
        } else {
          break;
        }
      }

      if (activeIdx !== -1 && activeIdx !== currentLyricIdx) {
        currentLyricIdx = activeIdx;

        // Show current lyric + next upcoming lyric
        lyricActive.classList.remove("active");

        // Timeout to re-trigger layout/animation transitions
        setTimeout(() => {
          lyricActive.textContent = lyrics[activeIdx].text;
          lyricActive.classList.add("active");
          // Show NEXT line as preview instead of previous
          lyricPrev.textContent = (activeIdx < lyrics.length - 1) ? lyrics[activeIdx + 1].text : "";
        }, 50);
      }
    }

    // ==========================================
    // CUSTOM CURSOR TRAIL PARTICLES
    // ==========================================
    const canvas = document.getElementById("cursor-canvas");
    const ctx = canvas.getContext("2d");
    let particles = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    class Particle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.size = Math.random() * 4 + 1;
        this.speedX = (Math.random() - 0.5) * 1.5;
        this.speedY = (Math.random() - 0.5) * 1.5;
        this.color = `hsla(${Math.random() * 20 + 340}, 100%, 75%, ${Math.random() * 0.4 + 0.6})`;
        this.life = 1;
        this.decay = Math.random() * 0.02 + 0.015;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.life -= this.decay;
      }

      draw() {
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 4;
        ctx.shadowColor = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0; // reset
      }
    }

    window.addEventListener("mousemove", (e) => {
      for (let i = 0; i < 2; i++) {
        particles.push(new Particle(e.clientX, e.clientY));
      }
    });

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        if (particles[i].life <= 0) {
          particles.splice(i, 1);
        } else {
          particles[i].draw();
        }
      }
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // ==========================================
    // INITIALIZATION & USER ENGAGEMENT GESTURE
    // ==========================================
    // Initialize Firebase listeners immediately so playlist and background are ready
    setupFirebaseListeners();
    // Fallback in case Firebase is blocked or offline
    setTimeout(markAppReady, 2000);
    
    // Pre-render list immediately
    renderPlaylist();

    clickTrigger.addEventListener("click", () => {
      clickTrigger.style.opacity = "0";
      setTimeout(() => clickTrigger.remove(), 800);

      // Auto plays background video (must be muted initially, but let's play)
      bgVideo.play().catch(() => { });

      // Initialize systems
      setupStats();
      requestAnimationFrame(updateFPS);

      // Load first song
      loadTrack(0);
      playTrack();
    });
  </script>
</body>

</html>
